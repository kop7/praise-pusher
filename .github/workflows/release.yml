# GitHub Actions Workflow created for handling the release process based on the draft release prepared with the Build workflow.
# Running the publishPlugin task requires all the following secrets to be provided: PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD, CERTIFICATE_CHAIN.
# See https://plugins.jetbrains.com/docs/intellij/plugin-signing.html for more information.

name: Release
on:
  push:
    tags:
      - 'v*'
  release:
    types: [ prereleased, released ]

jobs:

  # Prepare and publish the plugin to JetBrains Marketplace repository
  release:
    name: Publish Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Prepare and validate signing material from secrets
      - name: Prepare Signing Material
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
        run: |
          set -euo pipefail

          # Support both raw multiline PEM and escaped "\n" secret formats.
          if printf '%s' "$PRIVATE_KEY" | grep -q '\\n'; then
            printf '%b' "$PRIVATE_KEY" > /tmp/private_encrypted.pem
          else
            printf '%s' "$PRIVATE_KEY" > /tmp/private_encrypted.pem
          fi

          if printf '%s' "$CERTIFICATE_CHAIN" | grep -q '\\n'; then
            printf '%b' "$CERTIFICATE_CHAIN" > /tmp/chain.crt
          else
            printf '%s' "$CERTIFICATE_CHAIN" > /tmp/chain.crt
          fi

          # Normalize CRLF to LF in case secrets were pasted from Windows.
          sed -i 's/\r$//' /tmp/private_encrypted.pem /tmp/chain.crt

          # Fail early with a clear error if key/password are invalid.
          openssl pkcs8 \
            -in /tmp/private_encrypted.pem \
            -inform PEM \
            -passin env:PRIVATE_KEY_PASSWORD \
            -out /tmp/private_decrypted.pem

      # Publish the plugin to JetBrains Marketplace
      - name: Publish Plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#v}"

          ./gradlew publishPlugin \
            -Pversion="$RELEASE_VERSION" \
            -PintellijPlatform.signing.privateKeyFile=/tmp/private_encrypted.pem \
            -PintellijPlatform.signing.certificateChainFile=/tmp/chain.crt \
            -PintellijPlatform.signing.password="$PRIVATE_KEY_PASSWORD"

      # Upload an artifact as a release asset
      - name: Upload Release Asset
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./build/distributions/*
